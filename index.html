<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="RubyPills — A cute, Hello Kitty-inspired medication reminder to help you stay on top of your daily health routine with gentle encouragement.">
  <meta name="theme-color" content="#E4002B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>RubyPills 🎀 Hello Kitty Medication Reminder</title>

  <!-- Favicon: pink heart data URI -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <!-- ============================================
       MAIN APPLICATION CONTAINER
       ============================================ -->
  <div class="app-container" role="main">

    <!-- ==========================================
         TODAY SCREEN
         ========================================== -->
    <section
      id="screen-today"
      class="screen screen--active screen-decoration pattern-polka"
      role="region"
      aria-label="Today's medications"
    >
      <div class="screen__content" id="today-content">
        <!-- Dynamically rendered by TodayScreen.render() -->
      </div>
    </section>

    <!-- ==========================================
         HISTORY / CALENDAR SCREEN
         ========================================== -->
    <section
      id="screen-calendar"
      class="screen screen-decoration"
      role="region"
      aria-label="Medication history calendar"
    >
      <div class="screen__content" id="calendar-content">
        <!-- Dynamically rendered by CalendarScreen.render() -->
      </div>
    </section>

    <!-- ==========================================
         SETTINGS SCREEN
         ========================================== -->
    <section
      id="screen-settings"
      class="screen screen-decoration"
      role="region"
      aria-label="Application settings"
    >
      <div class="screen__content" id="settings-content">
        <!-- Dynamically rendered by SettingsScreen.render() -->
      </div>
    </section>

  </div>
  <!-- /.app-container -->

  <!-- ============================================
       BOTTOM NAVIGATION BAR
       ============================================ -->
  <nav class="nav-bottom" aria-label="Main navigation">

    <!-- Today Tab -->
    <button
      class="nav-tab nav-tab--active"
      data-screen="today"
      aria-label="Today"
      aria-current="page"
      id="nav-today"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <!-- Home / heart icon -->
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Today</span>
    </button>

    <!-- Calendar Tab -->
    <button
      class="nav-tab"
      data-screen="calendar"
      aria-label="History"
      id="nav-calendar"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <!-- Calendar icon -->
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>History</span>
    </button>

    <!-- Settings Tab -->
    <button
      class="nav-tab"
      data-screen="settings"
      aria-label="Settings"
      id="nav-settings"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <!-- Gear icon -->
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </button>

  </nav>

  <!-- ============================================
       JAVASCRIPT — loaded in dependency order
       ============================================ -->
  <script src="js/store.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/capacitor-bridge.js"></script>
  <script src="js/today.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
